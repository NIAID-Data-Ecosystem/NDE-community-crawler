name: Weekly NDE Community Crawler

on:
  schedule:
    - cron: "0 14 * * 1"   # Every Monday at 14:00 UTC (10am ET)
  workflow_dispatch:         # Manual trigger via GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push memory/ updates
      issues: write          # create candidate-reply issues

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install xvfb and browser OS deps
        run: sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -r requirements.txt
          .venv/bin/pip install --quiet praw python-dotenv
          .venv/bin/playwright install-deps chromium
          .venv/bin/playwright install chromium

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
          BIOCONDUCTOR_SESSION_COOKIE=${{ secrets.BIOCONDUCTOR_SESSION_COOKIE }}
          EOF

      - name: Run weekly crawl
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDE_PYTHON: ${{ github.workspace }}/.venv/bin/python
          NDE_FETCH: ${{ github.workspace }}/agent/fetch.py
          CLAUDE_SKIP_API_KEY_CHECK: "true"
        run: |
          xvfb-run -a claude --print "$(cat prompts/weekly_run.md)" \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"

      - name: Commit and push memory updates
        run: |
          git config user.name "nde-crawler[bot]"
          git config user.email "nde-crawler[bot]@users.noreply.github.com"
          git add memory/ config/
          git diff --cached --quiet || git commit -m "Weekly crawl $(date +%Y-%m-%d): automated run"
          git push
